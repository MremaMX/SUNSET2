<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COCKTAIL SUNSET | FLYER vSTYLE</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #ffffff;
      font-family: "Manrope", "Poppins", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
      color: #0C2C55;
    }

    .layout {
      width: min(96vw, 700px);
      height: min(96vh, 1100px);
      display: flex;
      flex-direction: column;
      justify-items: center;
      align-items: start;
      gap: 20px;
      padding: 36px 30px 34px;
      border-radius: 56px;
      background: #FEFDE6;
      box-shadow:
        0 28px 60px rgba(26, 53, 86, 0.16),
        0 8px 24px rgba(26, 53, 86, 0.09);
    }

    .left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .left h1 {
      color: #0C2C55;
      font-size: clamp(2.1rem, 4.2vw, 3.2rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: 2px;
      line-height: 1.05;
    }

    .instruction {
      color: #0C2C55;
      font-size: clamp(0.95rem, 1.8vw, 1.18rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      text-align: center;
      max-width: 90%;
      line-height: 1.35;
    }

    .buttons {
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: center;
      margin-bottom: 2px;
      width: 100%;
      flex-wrap: wrap;
    }

    .btn-circle {
      width: 206px;
      height: 60px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #1fc8c3 0%, #39d5ab 100%);
      color: #ffffff;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow:
        0 12px 24px rgba(31, 200, 195, .28),
        inset 0 -2px 0 rgba(0, 0, 0, 0.08);
      transition:
        filter 0.3s ease,
        background 0.35s ease,
        box-shadow 0.35s ease,
        transform 0.25s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 16px;
      overflow: hidden;
      white-space: nowrap;
    }

    .btn-circle:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 18px 32px rgba(31, 200, 195, .33),
        inset 0 -2px 0 rgba(0, 0, 0, 0.08);
    }

    .btn-circle.copied {
      background: linear-gradient(135deg, #22c5ef 0%, #25d7bd 100%);
      box-shadow:
        0 16px 36px rgba(34, 197, 239, 0.42),
        inset 0 -2px 0 rgba(0, 0, 0, 0.08);
      animation: copyBounce 0.48s ease;
    }

    @keyframes copyBounce {
      0% { transform: scale(1); }
      45% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    .right h2 {
      color: #0C2C55;
      font-size: clamp(0.95rem, 1.9vw, 1.18rem);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1.25;
      margin-top: 0;
    }

    .card-wrapper {
      width: min(78vw, 430px);
      aspect-ratio: 2 / 3;
      position: relative;
      border-radius: 42px;
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      perspective: 900px;
    }

    .card-wrapper:hover {
      transform: scale(1.015) translateY(-3px);
    }

    #card {
      width: 100%;
      height: 100%;
      border-radius: 42px;
      overflow: hidden;
      box-shadow:
        0 18px 40px rgba(0,0,0,.14),
        0 8px 20px rgba(0,0,0,.10);
      transition: transform 0.15s ease-out, box-shadow 0.4s ease, filter 0.4s ease;
      position: relative;
      background: #ffffff;
      border: 2px dashed transparent;
    }

    .card-wrapper:hover #card {
      box-shadow:
        0 25px 60px rgba(0,0,0,.18),
        0 10px 24px rgba(0,0,0,.11);
      filter: brightness(1.02);
    }

    #card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 42px;
      user-select: none;
      -webkit-user-drag: element;
      pointer-events: auto;
      transition: transform .3s ease, opacity .25s ease;
      cursor: grab;
    }

    #card img.dragging {
      transform: scale(0.95) translateY(8px);
      opacity: 0.45;
      cursor: grabbing;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      border-radius: 42px;
      background: transparent;
      pointer-events: none;
    }

    #card.drag-over {
      outline: 3px dashed #0C2C55;
      outline-offset: -8px;
      border-color: #0C2C55;
      background: rgba(12, 44, 85, 0.10);
      box-shadow:
        0 0 0 6px rgba(12,44,85,.15),
        0 35px 72px rgba(0,0,0,.25);
    }

    @media (max-width: 900px) {
      .layout {
        width: 98vw;
        height: 98vh;
        gap: 14px;
        padding: 22px 16px 18px;
        border-radius: 38px;
      }
      .buttons { gap: 12px; }
      .btn-circle {
        width: 47%;
        min-width: 138px;
        height: 54px;
        font-size: .86rem;
      }
      .card-wrapper {
        width: min(84vw, 350px);
        border-radius: 34px;
      }
      #card, #card img, .card-overlay { border-radius: 34px; }
    }
  </style>
</head>
<body>

  <div class="layout">
    <div class="left">
      <h1>Sunset Cocktail</h1>
      <p class="instruction">Copia el mensaje y pega, arrastra la imagen para enviar.</p>
      <div class="buttons">
        <button class="btn-circle" id="btn-en" data-original="Inglés">Inglés</button>
        <button class="btn-circle" id="btn-es" data-original="Español">Español</button>
      </div>
    </div>

    <div class="right">
      <h2>Arrastra la imagen y suelta</h2>
      <div class="card-wrapper" id="card-wrapper">
        <div id="card">
          <img
            id="flyer"
            draggable="true"
            src="https://lh3.googleusercontent.com/d/1aQz3pkG9wEWtK5YUkE3Zm40Gm8kBSi7p"
            alt="Flyer COCKTAIL SUNSET">
          <div class="card-overlay" id="card-overlay"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TEXTS = {
      en: `Dear Guest, Looking for the perfect Friday plan? 🌅

This Friday, July 17th, we invite you to our exclusive Sunset Cocktail experience at JOIA Paraíso. Join us to enjoy premium drinks and the best golden hour views of the resort. 🥂
We would be happy to receive you!`,
      es: `Estimado huésped, ¿Busca el plan perfecto para el viernes? 🌅

Este viernes 17 de julio, lo invitamos a nuestra exclusiva experiencia de cócteles al atardecer en JOIA Paraíso. Acompáñenos a disfrutar de bebidas premium y las mejores vistas del resort al atardecer. 🥂
¡Nos encantaría recibirlo!`
    };

    async function copyText(lang, btn) {
      try { await navigator.clipboard.writeText(TEXTS[lang]); }
      catch (_) {
        const ta = document.createElement('textarea');
        ta.value = TEXTS[lang];
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      const original = btn.dataset.original;
      btn.textContent = 'Copiado';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = original;
      }, 1400);
    }

    document.getElementById('btn-en').addEventListener('click', function() { copyText('en', this); });
    document.getElementById('btn-es').addEventListener('click', function() { copyText('es', this); });

    const card = document.getElementById('card');
    const wrapper = document.getElementById('card-wrapper');
    const flyer = document.getElementById('flyer');

    // Tilt
    wrapper.addEventListener('mousemove', function(e) {
      const rect = wrapper.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = ((y - centerY) / centerY) * -3;
      const rotateY = ((x - centerX) / centerX) * 3;
      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
    wrapper.addEventListener('mouseleave', function() {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });

    // DRAG OUT (como archivo/enlace)
    flyer.addEventListener('dragstart', (e) => {
      e.dataTransfer.effectAllowed = 'copy';
      flyer.classList.add('dragging');
      e.dataTransfer.setData('text/uri-list', flyer.src);
      e.dataTransfer.setData('text/plain', flyer.src);
      e.dataTransfer.setData('text/html', '<img src="' + flyer.src + '">');
      try { e.dataTransfer.setDragImage(flyer, 80, 80); } catch (_) {}
    });
    flyer.addEventListener('dragend', () => {
      flyer.classList.remove('dragging');
    });

    // Evitar abrir nueva pestaña al soltar
    window.addEventListener('dragover', (e) => { e.preventDefault(); }, false);
    window.addEventListener('drop', (e) => { e.preventDefault(); }, false);
    document.addEventListener('dragover', (e) => { e.preventDefault(); }, true);
    document.addEventListener('drop', (e) => { e.preventDefault(); }, true);

    // DROP IN
    card.addEventListener('dragenter', (e) => {
      e.preventDefault();
      card.classList.add('drag-over');
    });

    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
      card.classList.add('drag-over');
    });

    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });

    card.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      card.classList.remove('drag-over');

      const file = e.dataTransfer?.files?.[0];
      if (!file || !file.type.startsWith('image/')) return;

      const reader = new FileReader();
      reader.onload = (ev) => { flyer.src = ev.target.result; };
      reader.readAsDataURL(file);
    });

    // Pegar imagen con Ctrl+V
    window.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type && item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => { flyer.src = ev.target.result; };
          reader.readAsDataURL(file);
          break;
        }
      }
    });
  </script>

</body>
</html>
